spring.application.name=exam-protector

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3308/exam_protector?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=exam_user
spring.datasource.password=exam_user_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=YTJiMzRkNWU2Zjc4OTBhYmNkZWYwMTIzNDU2Nzg5MGFiY2RlZjAxMjM0NTY3ODkwYWJjZGVm
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# Server
server.port=8080
